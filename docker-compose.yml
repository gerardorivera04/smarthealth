services:
  mysql:
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: smarthealth-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: smarthealth_root
      MYSQL_DATABASE: smarthealth
      MYSQL_USER: smarthealth
      MYSQL_PASSWORD: smarthealth_pw
    volumes:
      - smarthealth_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psmarthealth_root"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./UserServer
      dockerfile: Dockerfile
    container_name: smarthealth-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      JWT_SECRET: temp-smarthealth-secret
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: smarthealth
      DB_PASSWORD: smarthealth_pw
      DB_NAME: smarthealth
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./UserDashboard
      dockerfile: Dockerfile
    container_name: smarthealth-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  smarthealth_mysql_data:
