services:
  mysql:
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: smarthealth-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: smarthealth_root
      MYSQL_DATABASE: smarthealth
      MYSQL_USER: smarthealth
      MYSQL_PASSWORD: smarthealth_pw
    volumes:
      - smarthealth_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psmarthealth_root"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  smarthealth_mysql_data:
